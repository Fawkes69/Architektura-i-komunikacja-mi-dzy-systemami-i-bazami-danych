version: "3.9"

services:
  auth_db:
    image: postgres:15-alpine
    container_name: auth_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_password
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  reservation_db:
    image: postgres:15-alpine
    container_name: reservation_db
    environment:
      POSTGRES_DB: reservation_db
      POSTGRES_USER: res_user
      POSTGRES_PASSWORD: res_password
    volumes:
      - reservation_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U res_user -d reservation_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth_service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth_service
    env_file:
      - ./auth-service/.env
    ports:
      - "8000:8000"
    depends_on:
      auth_db:
        condition: service_healthy
    volumes:
      - ./auth-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  reservation_service:
    build:
      context: ./reservation-service
      dockerfile: Dockerfile
    container_name: reservation_service
    env_file:
      - ./reservation-service/.env
    ports:
      - "8001:8001"
    depends_on:
      reservation_db:
        condition: service_healthy
    volumes:
      - ./reservation-service:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  auth_db_data:
  reservation_db_data:
