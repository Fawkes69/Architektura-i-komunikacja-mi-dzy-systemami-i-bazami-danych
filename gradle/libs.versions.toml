[versions]
exposedCore = "1.1.1"
exposedPostgresql = "0.53.0"
hikaricp = "7.0.2"
postgresql = "42.7.10"
agp = "9.1.1"
kotlin = "2.3.20"
coreKtx = "1.18.0"
junit = "4.13.2"
junitVersion = "1.3.0"
espressoCore = "3.7.0"
appcompat = "1.7.1"
material = "1.13.0"
activity = "1.13.0"
constraintlayout = "2.2.1"
postgresqlVersion = "42.7.10"
recyclerview = "1.4.0"
slf4jSimple = "2.0.17"

[libraries]
exposed-core = { module = "org.jetbrains.exposed:exposed-core", version.ref = "exposedCore" }
